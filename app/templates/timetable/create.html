{% extends "base.html" %}
{% block title %}Add Class{% endblock %}
{% block page_title %}Add Class to Timetable{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card form-card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>New Timetable Entry</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('timetable.create') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Subject / Class Name <span class="text-danger">*</span></label>
                        <input type="text" name="subject" class="form-control" placeholder="e.g. Data Structures" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Day of Week <span class="text-danger">*</span></label>
                            <select name="day_of_week" class="form-select" required>
                                <option value="" disabled selected>Select day</option>
                                {% for day in days %}
                                <option value="{{ day }}">{{ day }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Room / Location</label>
                            <input type="text" name="room" class="form-control" placeholder="e.g. Lab 3, Room 201">
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Start Time <span class="text-danger">*</span></label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">End Time <span class="text-danger">*</span></label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Department</label>
                        <input type="text" name="department" class="form-control" 
                               value="{{ user.department or '' }}"
                               placeholder="e.g. Computer Science">
                        <div class="form-text">Students in this department will see this class.</div>
                    </div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-2"></i>Add to Timetable
                        </button>
                        <a href="{{ url_for('timetable.view') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
